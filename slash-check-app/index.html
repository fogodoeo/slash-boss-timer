<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>썰자 체크판</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <a class="discordFloatingButton" href="https://discord.gg/UUn5qGAsyH" target="_blank" rel="noopener noreferrer" aria-label="Discord" title="Discord">
        <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19.2 5.2A16 16 0 0 0 15.2 4l-.2.4a13 13 0 0 1 3.4 1.7 11.6 11.6 0 0 0-12.8 0A13 13 0 0 1 9 4.4L8.8 4a16 16 0 0 0-4 1.2C2.3 8.9 1.7 12.5 2 16c1.7 1.2 3.3 2 4.9 2.5.4-.5.7-1 1-1.6-.6-.2-1.1-.5-1.6-.8l.4-.3c3.2 1.5 6.6 1.5 9.7 0l.4.3c-.5.3-1 .6-1.6.8.3.6.6 1.1 1 1.6 1.6-.5 3.3-1.3 4.9-2.5.4-4.1-.7-7.7-2.9-10.8ZM8.7 13.8c-.9 0-1.7-.8-1.7-1.8s.8-1.8 1.7-1.8 1.7.8 1.7 1.8-.8 1.8-1.7 1.8Zm6.6 0c-.9 0-1.7-.8-1.7-1.8s.8-1.8 1.7-1.8S17 11 17 12s-.8 1.8-1.7 1.8Z"/>
        </svg>
    </a>
    <main class="shell">
        <header class="topbar">
            <div>
                <span class="eyebrow">길드 운영</span>
                <h1>썰자 현황</h1>
                <p class="pageDesc">예약, 완료, 쿨타임을 한 화면에서 빠르게 처리합니다.</p>
            </div>
            <nav class="navTabs" aria-label="페이지 이동">
                <a class="active" href="./">썰자</a>
                <a href="./boss.html">보스</a>
                <a href="./boss-log.html">로그</a>
                <a href="./admin.html">관리</a>
            </nav>
            <div class="topbarActions">
                <button id="openProfileButton" class="memberChip" type="button" aria-label="닉네임 변경">
                    <span class="profileLabel">내 닉네임</span>
                    <strong id="selectedMemberLabel">길드원 미선택</strong>
                </button>
                <button id="enableNotifyButton" class="notifyIconButton" type="button" aria-label="알림 켜기" title="알림 켜기">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 22a2.2 2.2 0 0 0 2.2-2.2H9.8A2.2 2.2 0 0 0 12 22Zm7-5.2-1.8-1.8v-4.3c0-3-1.6-5.5-4.4-6.2V3.8a.8.8 0 0 0-1.6 0v.7C8.5 5.2 6.8 7.7 6.8 10.7V15L5 16.8v1h14v-1Zm-3.4-.6H8.4v-5.5c0-2.3 1.3-4.6 3.6-4.6s3.6 2.3 3.6 4.6v5.5Z"/>
                    </svg>
                    <span class="notifyDot" aria-hidden="true"></span>
                    <span class="notifyText">알림</span>
                </button>
            </div>
        </header>

        <nav class="sectionTabs" aria-label="썰자 메뉴">
            <a class="active" href="./">체크</a>
            <a href="./ranking.html">랭킹</a>
            <a href="./analytics.html">분석</a>
        </nav>

        <section id="zoneList" class="zoneList" aria-label="썰자 구역 목록"></section>
    </main>

    <template id="rouletteCardTemplate">
        <article class="rouletteCard">
            <div class="rouletteCardMain">
                <strong class="rouletteCardName">랜덤 썰자</strong>
                <span class="rouletteCardDesc">예약 가능한 구역 중 하나를 뽑습니다</span>
            </div>
            <div class="rouletteCardActions">
                <span class="rouletteCardSpacer" aria-hidden="true"></span>
                <button class="rouletteCardButton" type="button">룰렛</button>
            </div>
        </article>
    </template>

    <template id="zoneCardTemplate">
        <article class="zoneCard">
            <div class="zoneMain">
                <div class="zoneTitleLine">
                    <strong class="zoneName"></strong>
                    <button class="zoneMenuButton" type="button" aria-label="구역 메뉴">⋯</button>
                </div>
            </div>
            <div class="zoneStatus">
                <span class="lastText"></span>
                <span class="reservationText"></span>
            </div>
            <div class="zoneActions">
                <button class="reserveButton" type="button">예약</button>
                <button class="checkButton" type="button">완료</button>
            </div>
        </article>
    </template>

    <div id="profileModal" class="modalOverlay hidden" role="dialog" aria-modal="true" aria-labelledby="profileTitle">
        <form id="profileForm" class="profileModal">
            <button id="closeProfileButton" class="modalClose" type="button" aria-label="닫기">×</button>
            <span class="modalEyebrow">사용자 설정</span>
            <h2 id="profileTitle">길드원을 선택하세요</h2>
            <p>닉네임 일부를 입력하면 등록된 길드원이 추천됩니다. 목록에서 본인 닉네임을 선택하세요.</p>
            <input id="memberSearchInput" type="text" autocomplete="off" placeholder="예: N건강">
            <div id="memberSuggest" class="memberSuggest"></div>
            <button id="skipProfileButton" class="modalSkip" type="button">나중에 선택</button>
        </form>
    </div>

    <div id="zoneActionModal" class="modalOverlay hidden" role="dialog" aria-modal="true" aria-labelledby="zoneActionTitle">
        <section class="zoneActionSheet">
            <button id="closeZoneActionButton" class="modalClose" type="button" aria-label="닫기">×</button>
            <span class="modalEyebrow">구역 관리</span>
            <h2 id="zoneActionTitle">구역 작업</h2>
            <p id="zoneActionDesc">초기화할 범위를 선택하세요.</p>
            <label class="zoneActionAdminField">
                <span>관리자 비밀번호</span>
                <input id="zoneActionAdminPasswordInput" type="password" autocomplete="off" placeholder="초기화/기록 취소 시 입력">
            </label>
            <div class="zoneActionList">
                <button id="resetZoneStateButton" type="button">
                    <strong>상태 초기화</strong>
                    <span>현재 잠김, 예약, 최근 표시만 비웁니다. 랭킹은 유지됩니다.</span>
                </button>
                <button id="cancelLastCheckButton" class="danger" type="button">
                    <strong>마지막 완료 기록 취소</strong>
                    <span>마지막 완료 로그를 삭제하고 랭킹 횟수도 차감합니다.</span>
                </button>
            </div>
        </section>
    </div>

    <div id="rouletteModal" class="modalOverlay hidden" role="dialog" aria-modal="true" aria-labelledby="rouletteTitle">
        <section class="rouletteSheet">
            <button id="closeRouletteButton" class="modalClose" type="button" aria-label="닫기">×</button>
            <span class="modalEyebrow">예약 룰렛</span>
            <h2 id="rouletteTitle">가능 구역 뽑기</h2>
            <div class="rouletteWindow" aria-live="polite">
                <div id="rouletteTrack" class="rouletteTrack"></div>
                <div class="rouletteMarker"></div>
            </div>
            <p id="rouletteResult" class="rouletteResult">쿨타임과 예약이 없는 구역 중에서 하나를 뽑습니다.</p>
            <div class="rouletteActions">
                <button id="rouletteSpinButton" type="button">룰렛 돌리기</button>
                <button id="rouletteReserveButton" type="button" disabled>예약하기</button>
            </div>
        </section>
    </div>

    <div id="toastHost" class="toastHost" aria-live="polite"></div>

    <script src="./app.js"></script>
    <script src="./boss-alert-monitor.js"></script>
</body>
</html>
