<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>보스 랭킹</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="bossPage">
    <main class="shell">
        <header class="topbar">
            <div>
                <span class="eyebrow">보스 운영</span>
                <h1>보스 랭킹</h1>
                <p class="pageDesc">보스 참여 점수, 컷 입력, 최근 참여 흐름을 확인합니다.</p>
            </div>
            <nav class="navTabs" aria-label="페이지 이동">
                <a href="./">썰자</a>
                <a class="active" href="./boss.html">보스</a>
                <a href="./boss-log.html">로그</a>
                <a href="./gecko.html">게코</a>
                <a href="./admin.html">관리</a>
            </nav>
            <div class="topbarActions">
                <button id="openProfileButton" class="memberChip" type="button" aria-label="닉네임 변경">
                    <span class="profileLabel">내 닉네임</span>
                    <strong id="selectedMemberLabel">길드원 미선택</strong>
                </button>
                <button id="enableNotifyButton" class="notifyIconButton" type="button" aria-label="알림 켜기" title="알림 켜기">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 22a2.2 2.2 0 0 0 2.2-2.2H9.8A2.2 2.2 0 0 0 12 22Zm7-5.2-1.8-1.8v-4.3c0-3-1.6-5.5-4.4-6.2V3.8a.8.8 0 0 0-1.6 0v.7C8.5 5.2 6.8 7.7 6.8 10.7V15L5 16.8v1h14v-1Zm-3.4-.6H8.4v-5.5c0-2.3 1.3-4.6 3.6-4.6s3.6 2.3 3.6 4.6v5.5Z"/>
                    </svg>
                    <span class="notifyDot" aria-hidden="true"></span>
                    <span class="notifyText">알림</span>
                </button>
            </div>
        </header>

        <nav class="sectionTabs" aria-label="보스 메뉴">
            <a href="./boss.html">일정</a>
            <a class="active" href="./boss-ranking.html">랭킹</a>
            <a href="./boss-analytics.html">분석</a>
        </nav>

        <section class="rankingLayout">
            <section class="panel">
                <div class="panelHead">
                    <div>
                        <span class="label">참여 랭킹</span>
                        <strong id="bossRankingSummary">기록 불러오는 중</strong>
                    </div>
                </div>
                <div class="rankingFilters">
                    <div class="segmented" aria-label="기간 선택">
                        <button class="active" type="button" data-period="day">일간</button>
                        <button type="button" data-period="week">주간</button>
                        <button type="button" data-period="all">전체</button>
                    </div>
                </div>
                <div id="bossRankingList" class="rankingList wide"></div>
            </section>

            <section class="panel">
                <div class="panelHead">
                    <div>
                        <span class="label">최근 보스 기록</span>
                        <strong id="bossRecentSummary">0건</strong>
                    </div>
                </div>
                <div id="bossRecentList" class="logList"></div>
            </section>
        </section>
    </main>

    <script src="./common-header.js"></script>
    <script src="./boss-alert-monitor.js"></script>
    <script src="./boss-ranking.js"></script>
</body>
</html>
