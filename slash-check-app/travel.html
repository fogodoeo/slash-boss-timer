<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>시라하마 여행 정산</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <style>
        body {
            background: #eef2f7;
        }

        .travelShell {
            width: min(1160px, calc(100% - 28px));
            margin: 0 auto;
            padding: 18px 0 42px;
        }

        .travelTop {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 14px;
            align-items: end;
            margin-bottom: 14px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background:
                linear-gradient(135deg, rgba(255,255,255,.96), rgba(237,244,255,.88)),
                #fff;
            box-shadow: var(--shadow);
        }

        .travelTop h1 {
            font-size: clamp(24px, 4vw, 38px);
        }

        .travelActions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }

        .travelButton,
        .travelGhostButton,
        .travelDangerButton {
            min-height: 38px;
            border-radius: 8px;
            padding: 0 13px;
            font-size: 13px;
            font-weight: 900;
        }

        .travelButton {
            border: 1px solid var(--blue);
            background: var(--blue);
            color: #fff;
        }

        .travelGhostButton {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .travelDangerButton {
            border: 1px solid #f2c4bd;
            background: #fff6f4;
            color: #b42318;
        }

        .travelGrid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .travelMetric {
            min-height: 118px;
            padding: 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: var(--shadow);
        }

        .travelMetric span {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
        }

        .travelMetric strong {
            display: block;
            font-size: clamp(22px, 3vw, 30px);
            line-height: 1.06;
        }

        .travelMetric small {
            display: block;
            margin-top: 8px;
            color: var(--muted);
            line-height: 1.35;
        }

        .travelLayout {
            display: grid;
            grid-template-columns: minmax(320px, .9fr) minmax(0, 1.35fr);
            gap: 14px;
        }

        .travelPanel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .travelPanelHead {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--line-soft);
            background: var(--soft);
        }

        .travelPanelHead strong {
            display: block;
            font-size: 17px;
        }

        .travelForm,
        .travelList,
        .pinBox {
            display: grid;
            gap: 10px;
            padding: 14px;
        }

        .travelForm label,
        .pinBox label {
            display: grid;
            gap: 6px;
            min-width: 0;
        }

        .travelForm label span,
        .pinBox label span {
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
        }

        .travelForm input,
        .travelForm select,
        .travelForm textarea,
        .pinBox input {
            width: 100%;
            min-height: 40px;
            border: 1px solid var(--line);
            border-radius: 7px;
            background: #fff;
            color: var(--text);
            padding: 8px 10px;
        }

        .travelForm textarea {
            min-height: 78px;
            resize: vertical;
        }

        .travelForm .two {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .photoPreview {
            display: none;
            width: 100%;
            max-height: 220px;
            object-fit: contain;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--soft);
        }

        .photoPreview.show {
            display: block;
        }

        .travelEntry {
            display: grid;
            gap: 10px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }

        .travelEntryTop {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: start;
        }

        .travelEntry b {
            display: block;
            font-size: 15px;
        }

        .travelEntryMeta {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }

        .travelAmount {
            color: var(--blue);
            font-size: 18px;
            font-weight: 950;
            white-space: nowrap;
        }

        .travelTags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .travelTags span,
        .receiptLink {
            display: inline-flex;
            align-items: center;
            min-height: 26px;
            border-radius: 999px;
            padding: 3px 8px;
            background: var(--soft);
            color: var(--text-soft);
            font-size: 12px;
            font-weight: 800;
            text-decoration: none;
        }

        .pinOverlay {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: grid;
            place-items: center;
            padding: 18px;
            background: rgba(16, 24, 40, .62);
            backdrop-filter: blur(10px);
        }

        .pinOverlay.hidden {
            display: none;
        }

        .pinCard {
            width: min(420px, 100%);
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: var(--shadow-pop);
            overflow: hidden;
        }

        .pinCardHead {
            padding: 18px;
            border-bottom: 1px solid var(--line-soft);
        }

        .pinCardHead p {
            margin: 6px 0 0;
            color: var(--muted);
            line-height: 1.45;
        }

        .statusLine {
            min-height: 20px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.4;
        }

        .statusLine.error {
            color: #b42318;
            font-weight: 800;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 900px) {
            .travelTop,
            .travelLayout {
                grid-template-columns: 1fr;
            }

            .travelActions {
                justify-content: stretch;
            }

            .travelActions > * {
                flex: 1 1 130px;
                justify-content: center;
            }

            .travelGrid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 560px) {
            .travelShell {
                width: min(100% - 18px, 1160px);
            }

            .travelGrid,
            .travelForm .two {
                grid-template-columns: 1fr;
            }

            .travelMetric {
                min-height: 98px;
            }
        }
    </style>
</head>
<body>
    <div id="pinOverlay" class="pinOverlay">
        <section class="pinCard">
            <div class="pinCardHead">
                <span class="eyebrow">PRIVATE</span>
                <h1>여행 정산</h1>
                <p>가족여행 결제 내역과 영수증 사진을 임시로 기록하는 페이지입니다.</p>
            </div>
            <form id="pinForm" class="pinBox">
                <label>
                    <span>비밀번호</span>
                    <input id="pinInput" type="password" inputmode="numeric" autocomplete="current-password" placeholder="비밀번호 입력">
                </label>
                <button class="travelButton" type="submit">열기</button>
                <div id="pinStatus" class="statusLine"></div>
            </form>
        </section>
    </div>

    <main class="travelShell">
        <header class="travelTop">
            <div>
                <span class="eyebrow">2026 시라하마 가족여행</span>
                <h1>실시간 결제 내역</h1>
                <p class="pageDesc">사진은 서버에 저장하고, 금액과 카테고리는 바로 합산합니다. 여행 후 서버를 내리면 됩니다.</p>
            </div>
            <div class="travelActions">
                <a class="travelGhostButton" href="./">보스 타이머</a>
                <button id="exportCsvButton" class="travelGhostButton" type="button">CSV 복사</button>
                <button id="lockButton" class="travelDangerButton" type="button">잠그기</button>
            </div>
        </header>

        <section class="travelGrid" aria-label="정산 요약">
            <article class="travelMetric">
                <span>총 예산</span>
                <strong id="budgetTotal">3,000,000원</strong>
                <small>부모님께 받는 공금 기준</small>
            </article>
            <article class="travelMetric">
                <span>고정비</span>
                <strong id="fixedTotal">2,312,758원</strong>
                <small>항공 순액, 숙소, 패스권</small>
            </article>
            <article class="travelMetric">
                <span>현지 등록액</span>
                <strong id="spentTotal">0원</strong>
                <small id="spentMeta">0건</small>
            </article>
            <article class="travelMetric">
                <span>남은 예산</span>
                <strong id="remainTotal">687,242원</strong>
                <small>총 예산 - 고정비 - 등록액</small>
            </article>
        </section>

        <section class="travelLayout">
            <article class="travelPanel">
                <div class="travelPanelHead">
                    <div>
                        <span class="label">영수증 추가</span>
                        <strong>결제 내역 입력</strong>
                    </div>
                    <span id="saveStatus" class="statusLine"></span>
                </div>
                <form id="expenseForm" class="travelForm">
                    <div class="two">
                        <label>
                            <span>날짜</span>
                            <input id="dateInput" type="date">
                        </label>
                        <label>
                            <span>결제자</span>
                            <select id="payerInput">
                                <option>공금</option>
                                <option>본인</option>
                                <option>엄마</option>
                                <option>아빠</option>
                                <option>기타</option>
                            </select>
                        </label>
                    </div>

                    <div class="two">
                        <label>
                            <span>카테고리</span>
                            <select id="categoryInput">
                                <option>식사</option>
                                <option>카페</option>
                                <option>교통</option>
                                <option>관광</option>
                                <option>편의점</option>
                                <option>쇼핑</option>
                                <option>숙소</option>
                                <option>기타</option>
                            </select>
                        </label>
                        <label>
                            <span>결제수단</span>
                            <select id="methodInput">
                                <option>카드</option>
                                <option>현금</option>
                                <option>교통카드</option>
                                <option>기타</option>
                            </select>
                        </label>
                    </div>

                    <label>
                        <span>상호명</span>
                        <input id="merchantInput" type="text" autocomplete="off" placeholder="예: 야마노우치, 카게로우 카페">
                    </label>

                    <label>
                        <span>항목</span>
                        <input id="itemInput" type="text" autocomplete="off" placeholder="예: 점심, 택시, 카페">
                    </label>

                    <div class="two">
                        <label>
                            <span>통화</span>
                            <select id="currencyInput">
                                <option value="JPY">JPY</option>
                                <option value="KRW">KRW</option>
                            </select>
                        </label>
                        <label>
                            <span>금액</span>
                            <input id="amountInput" type="number" min="0" inputmode="numeric" placeholder="숫자만">
                        </label>
                    </div>

                    <label>
                        <span>영수증 사진</span>
                        <input id="receiptInput" type="file" accept="image/jpeg,image/png,image/webp" capture="environment">
                    </label>
                    <img id="photoPreview" class="photoPreview" alt="영수증 미리보기">

                    <label>
                        <span>메모</span>
                        <textarea id="memoInput" placeholder="예: 3인 점심, 현금 결제, 확인 필요"></textarea>
                    </label>

                    <button class="travelButton" type="submit">등록</button>
                </form>
            </article>

            <article class="travelPanel">
                <div class="travelPanelHead">
                    <div>
                        <span class="label">결제 내역</span>
                        <strong id="entrySummary">0건</strong>
                    </div>
                    <label style="display:grid;gap:4px;min-width:110px;">
                        <span class="label" style="margin:0;">환율</span>
                        <input id="rateInput" type="number" inputmode="decimal" min="0" step="0.1" value="9.5" style="height:34px;border:1px solid var(--line);border-radius:7px;padding:0 8px;text-align:right;">
                    </label>
                </div>
                <div id="travelList" class="travelList"></div>
            </article>
        </section>
    </main>

    <script src="./travel.js"></script>
</body>
</html>
