<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>시라하마 영수증 AI 정산</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <style>
        body {
            background: #f4f6f9;
        }

        html {
            scroll-behavior: smooth;
        }

        .travelShell {
            width: min(1120px, calc(100% - 28px));
            margin: 0 auto;
            padding: 14px 0 44px;
        }

        .travelTop {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 14px;
            align-items: center;
            margin-bottom: 10px;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: var(--shadow);
        }

        .travelTop h1 {
            font-size: clamp(22px, 3vw, 30px);
        }

        .travelActions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }

        .travelTopText {
            min-width: 0;
        }

        .quickNav {
            position: sticky;
            top: 0;
            z-index: 10;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 10px;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, .96);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .quickNav a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 36px;
            border-radius: 7px;
            background: var(--soft);
            color: var(--text-soft);
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
        }

        .quickNav a:focus-visible,
        .travelButton:focus-visible,
        .travelGhostButton:focus-visible,
        .travelDangerButton:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible {
            outline: 3px solid rgba(20, 87, 217, .18);
            outline-offset: 2px;
        }

        .travelButton,
        .travelGhostButton,
        .travelDangerButton {
            min-height: 38px;
            border-radius: 8px;
            padding: 0 13px;
            font-size: 13px;
            font-weight: 900;
        }

        .travelButton {
            border: 1px solid var(--blue);
            background: var(--blue);
            color: #fff;
        }

        .travelButton.full {
            width: 100%;
            min-height: 46px;
            font-size: 15px;
        }

        .travelGhostButton {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .travelDangerButton {
            border: 1px solid #f2c4bd;
            background: #fff6f4;
            color: #b42318;
        }

        .travelGrid {
            display: grid;
            grid-template-columns: 1.3fr repeat(3, minmax(0, .9fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .travelMetric {
            min-height: 112px;
            padding: 15px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: var(--shadow);
        }

        .primaryMetric {
            border-color: #b8d3ff;
            background: linear-gradient(180deg, #ffffff, #f5f9ff);
        }

        .travelMetric span {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
        }

        .travelMetric strong {
            display: block;
            font-size: clamp(20px, 2.6vw, 29px);
            line-height: 1.06;
            word-break: keep-all;
        }

        .travelMetric small {
            display: block;
            margin-top: 8px;
            color: var(--muted);
            line-height: 1.35;
        }

        .travelLayout {
            display: grid;
            grid-template-columns: minmax(310px, .84fr) minmax(0, 1.36fr);
            gap: 14px;
            align-items: start;
        }

        .travelStack {
            display: grid;
            gap: 14px;
        }

        .walletPanel {
            scroll-margin-top: 70px;
        }

        .uploadPanel {
            position: sticky;
            top: 68px;
            scroll-margin-top: 70px;
        }

        #ledgerPanel {
            scroll-margin-top: 70px;
        }

        .travelPanel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .travelPanelHead {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            min-height: 66px;
            padding: 14px;
            border-bottom: 1px solid var(--line-soft);
            background: var(--soft);
        }

        .travelPanelHead strong {
            display: block;
            font-size: 17px;
        }

        .panelSub {
            margin-top: 2px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
        }

        .walletGrid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
            padding: 12px;
        }

        .walletCard {
            display: grid;
            gap: 9px;
            min-width: 0;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }

        .walletCardTop {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: start;
        }

        .walletCard b {
            font-size: 14px;
        }

        .walletBalance {
            color: var(--blue);
            font-size: clamp(20px, 2.8vw, 28px);
            font-weight: 950;
            line-height: 1.05;
            word-break: keep-all;
        }

        .walletMeta {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }

        .walletControls {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
            align-items: center;
        }

        .walletControls input {
            width: 100%;
            min-height: 38px;
            border: 1px solid var(--line);
            border-radius: 7px;
            padding: 8px 10px;
            text-align: right;
        }

        .travelForm,
        .travelList,
        .pinBox {
            display: grid;
            gap: 12px;
            padding: 12px;
        }

        .travelForm label,
        .pinBox label {
            display: grid;
            gap: 6px;
            min-width: 0;
        }

        .travelForm label span,
        .pinBox label span {
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
        }

        .travelForm input,
        .travelForm select,
        .travelForm textarea,
        .rateControl input,
        .pinBox input {
            width: 100%;
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 7px;
            background: #fff;
            color: var(--text);
            padding: 8px 10px;
        }

        .travelForm textarea {
            min-height: 72px;
            resize: vertical;
        }

        .travelForm input[type="file"] {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .fileDrop {
            display: grid;
            gap: 8px;
            min-height: 116px;
            padding: 16px;
            border: 1px dashed #b8c7dc;
            border-radius: 8px;
            background: #f8fbff;
            cursor: pointer;
            align-content: center;
        }

        .fileDropTitle {
            color: var(--text);
            font-size: 17px;
            font-weight: 950;
        }

        .fileDropMeta {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.4;
        }

        .fileDropName {
            display: inline-flex;
            width: fit-content;
            max-width: 100%;
            min-height: 28px;
            align-items: center;
            border-radius: 7px;
            padding: 4px 8px;
            background: #fff;
            color: var(--text-soft);
            font-size: 12px;
            font-weight: 800;
            overflow-wrap: anywhere;
        }

        .travelForm .two {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .photoPreview {
            display: none;
            width: 100%;
            max-height: 260px;
            object-fit: contain;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--soft);
        }

        .photoPreview.show {
            display: block;
        }

        .travelEntry {
            display: grid;
            gap: 9px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }

        .travelEntryTop {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: start;
        }

        .travelEntry b {
            display: block;
            font-size: 15px;
        }

        .travelEntryMeta {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }

        .travelAmount {
            color: var(--blue);
            font-size: 17px;
            font-weight: 950;
            white-space: nowrap;
        }

        .travelTags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .travelTags span,
        .receiptLink {
            display: inline-flex;
            align-items: center;
            min-height: 26px;
            border-radius: 7px;
            padding: 3px 8px;
            background: var(--soft);
            color: var(--text-soft);
            font-size: 12px;
            font-weight: 800;
            text-decoration: none;
        }

        .travelTags .tagType {
            background: #eef7f1;
            color: #146c43;
        }

        .travelTags .tagImpact {
            background: #fff8e6;
            color: #8a5a00;
        }

        .travelTags .tagStatus {
            background: #eef2ff;
            color: #3046a5;
        }

        .receiptLink {
            background: #eef4ff;
            color: var(--blue);
        }

        .emptyEntry {
            min-height: 112px;
            align-content: center;
            background: linear-gradient(180deg, #fff, #fafbfc);
        }

        .rateControl {
            display: grid;
            gap: 4px;
            min-width: 112px;
        }

        .rateControl .label {
            margin: 0;
        }

        .rateControl input {
            height: 36px;
            min-height: 36px;
            padding: 0 8px;
            text-align: right;
        }

        .pinOverlay {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: grid;
            place-items: center;
            padding: 18px;
            background: rgba(16, 24, 40, .62);
            backdrop-filter: blur(10px);
        }

        .pinOverlay.hidden {
            display: none;
        }

        .pinCard {
            width: min(420px, 100%);
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: var(--shadow-pop);
            overflow: hidden;
        }

        .pinCardHead {
            padding: 18px;
            border-bottom: 1px solid var(--line-soft);
        }

        .pinCardHead p {
            margin: 6px 0 0;
            color: var(--muted);
            line-height: 1.45;
        }

        .statusLine {
            min-height: 20px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.4;
        }

        .statusLine.error {
            color: #b42318;
            font-weight: 800;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 900px) {
            .travelTop,
            .travelLayout {
                grid-template-columns: 1fr;
            }

            .uploadPanel {
                position: static;
            }

            .travelActions {
                justify-content: stretch;
            }

            .travelActions > * {
                flex: 1 1 130px;
                justify-content: center;
            }

            .travelGrid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .walletGrid {
                grid-template-columns: repeat(3, minmax(210px, 1fr));
                overflow-x: auto;
                scroll-snap-type: x proximity;
            }

            .walletCard {
                scroll-snap-align: start;
            }
        }

        @media (max-width: 560px) {
            .travelShell {
                width: min(100% - 16px, 1160px);
                padding-top: 8px;
            }

            .travelTop {
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 12px;
            }

            .travelTop h1 {
                font-size: 24px;
            }

            .travelActions {
                display: grid;
                grid-template-columns: 1fr 1fr;
            }

            .travelButton,
            .travelGhostButton,
            .travelDangerButton {
                min-height: 42px;
            }

            .travelGrid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .primaryMetric {
                grid-column: 1 / -1;
            }

            .travelMetric:last-child {
                grid-column: 1 / -1;
            }

            .travelForm .two {
                grid-template-columns: 1fr;
            }

            .travelMetric {
                min-height: 92px;
                padding: 13px;
            }

            .travelMetric:not(.primaryMetric) {
                min-height: auto;
            }

            .walletGrid {
                grid-template-columns: 1fr;
                overflow: visible;
            }

            .travelEntryTop {
                grid-template-columns: 1fr;
            }

            .travelAmount {
                justify-self: start;
            }

            .travelPanelHead,
            .ledgerHead {
                align-items: start;
            }

            .fileDrop {
                min-height: 104px;
            }

            .quickNav {
                top: 0;
                margin-left: -2px;
                margin-right: -2px;
            }
        }
    </style>
</head>
<body>
    <div id="pinOverlay" class="pinOverlay">
        <section class="pinCard">
            <div class="pinCardHead">
                <span class="eyebrow">PRIVATE</span>
                <h1>영수증 AI 정산</h1>
                <p>영수증 사진만 올리면 로컬 AI 워커가 판독해서 결제 내역으로 채웁니다.</p>
            </div>
            <form id="pinForm" class="pinBox">
                <label>
                    <span>비밀번호</span>
                    <input id="pinInput" type="password" inputmode="numeric" autocomplete="current-password" placeholder="비밀번호 입력">
                </label>
                <button class="travelButton" type="submit">열기</button>
                <div id="pinStatus" class="statusLine"></div>
            </form>
        </section>
    </div>

    <main class="travelShell">
        <header class="travelTop">
            <div class="travelTopText">
                <span class="eyebrow">2026 시라하마 가족여행</span>
                <h1>영수증 정산</h1>
            </div>
            <div class="travelActions">
                <button id="exportCsvButton" class="travelGhostButton" type="button">CSV 복사</button>
                <button id="lockButton" class="travelDangerButton" type="button">잠그기</button>
            </div>
        </header>

        <nav class="quickNav" aria-label="빠른 이동">
            <a href="#receiptPanel">영수증</a>
            <a href="#walletPanel">잔액</a>
            <a href="#ledgerPanel">내역</a>
        </nav>

        <section class="travelGrid" aria-label="정산 요약">
            <article class="travelMetric primaryMetric">
                <span>남은 예산</span>
                <strong id="remainTotal">687,242원</strong>
                <small>총 예산 - 고정비 - 현지 등록액</small>
            </article>
            <article class="travelMetric">
                <span>현지 등록액</span>
                <strong id="spentTotal">0원</strong>
                <small id="spentMeta">0건</small>
            </article>
            <article class="travelMetric">
                <span>고정비</span>
                <strong id="fixedTotal">2,312,758원</strong>
                <small>항공 순액, 숙소, 패스권</small>
            </article>
            <article class="travelMetric">
                <span>총 예산</span>
                <strong id="budgetTotal">3,000,000원</strong>
                <small>부모님께 받는 공금 기준</small>
            </article>
        </section>

        <section class="travelLayout">
            <article id="receiptPanel" class="travelPanel uploadPanel">
                <div class="travelPanelHead">
                    <div>
                        <span class="label">영수증 추가</span>
                        <strong>사진 업로드</strong>
                        <div class="panelSub">사진만 올리면 AI 워커가 금액과 거래유형을 채웁니다.</div>
                    </div>
                    <span id="saveStatus" class="statusLine"></span>
                </div>
                <form id="expenseForm" class="travelForm">
                    <label class="fileDrop" for="receiptInput">
                        <span class="fileDropTitle">영수증 사진 선택</span>
                        <span id="receiptFileName" class="fileDropName">선택된 사진 없음</span>
                        <span class="fileDropMeta">JPG, PNG, WEBP 지원</span>
                        <input id="receiptInput" type="file" accept="image/jpeg,image/png,image/webp" capture="environment" required>
                    </label>
                    <img id="photoPreview" class="photoPreview" alt="영수증 미리보기">

                    <div class="two">
                        <label>
                            <span>날짜</span>
                            <input id="dateInput" type="date">
                        </label>
                        <label>
                            <span>결제자</span>
                            <select id="payerInput">
                                <option>공금</option>
                                <option>본인</option>
                                <option>엄마</option>
                                <option>아빠</option>
                                <option>기타</option>
                            </select>
                        </label>
                    </div>

                    <label>
                        <span>메모 선택</span>
                        <textarea id="memoInput" placeholder="필요할 때만 입력: 공금/개인, 확인 필요 등"></textarea>
                    </label>

                    <button class="travelButton full" type="submit">영수증 업로드</button>
                </form>
            </article>

            <div class="travelStack">
                <section id="walletPanel" class="travelPanel walletPanel" aria-label="현재 잔액">
                    <div class="travelPanelHead">
                        <div>
                            <span class="label">현재 잔액</span>
                            <strong>반수동 지갑</strong>
                        </div>
                        <span id="walletStatus" class="statusLine"></span>
                    </div>
                    <div id="walletList" class="walletGrid"></div>
                </section>

                <article id="ledgerPanel" class="travelPanel">
                    <div class="travelPanelHead ledgerHead">
                        <div>
                            <span class="label">결제 내역</span>
                            <strong id="entrySummary">0건</strong>
                        </div>
                        <label class="rateControl">
                            <span class="label">환율</span>
                            <input id="rateInput" type="number" inputmode="decimal" min="0" step="0.1" value="9.5">
                        </label>
                    </div>
                    <div id="travelList" class="travelList"></div>
                </article>
            </div>
        </section>
    </main>

    <script src="./travel.js"></script>
</body>
</html>
