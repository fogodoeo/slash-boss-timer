<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>시라하마 영수증 AI 정산</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
    <style>
        body {
            background: #f4f6f9;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 78px;
        }

        .travelShell {
            width: min(1120px, calc(100% - 28px));
            margin: 0 auto;
            padding: 10px 0 44px;
        }

        .travelTop {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 14px;
            align-items: center;
            margin-bottom: 10px;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: var(--shadow);
        }

        .travelTop h1 {
            font-size: clamp(22px, 3vw, 30px);
        }

        .travelActions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: flex-end;
        }

        .travelTopText {
            min-width: 0;
        }

        .quickNav {
            position: sticky;
            top: 0;
            z-index: 10;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 10px;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, .96);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
        }

        .quickNav a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 36px;
            border-radius: 7px;
            background: var(--soft);
            color: var(--text-soft);
            font-size: 13px;
            font-weight: 900;
            text-decoration: none;
        }

        .bottomNav {
            display: none;
        }

        .quickNav a:focus-visible,
        .travelButton:focus-visible,
        .travelGhostButton:focus-visible,
        .travelDangerButton:focus-visible,
        input:focus-visible,
        select:focus-visible,
        textarea:focus-visible {
            outline: 3px solid rgba(20, 87, 217, .18);
            outline-offset: 2px;
        }

        .travelButton,
        .travelGhostButton,
        .travelDangerButton {
            min-height: 38px;
            border-radius: 8px;
            padding: 0 13px;
            font-size: 13px;
            font-weight: 900;
        }

        .travelButton {
            border: 1px solid var(--blue);
            background: var(--blue);
            color: #fff;
        }

        .travelButton.full {
            width: 100%;
            min-height: 46px;
            font-size: 15px;
        }

        .travelGhostButton {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }

        .travelDangerButton {
            border: 1px solid #f2c4bd;
            background: #fff6f4;
            color: #b42318;
        }

        .travelGrid {
            display: grid;
            grid-template-columns: 1.3fr repeat(3, minmax(0, .9fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .travelMetric {
            min-height: 112px;
            padding: 15px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: var(--shadow);
        }

        .primaryMetric {
            border-color: #b8d3ff;
            background: linear-gradient(180deg, #ffffff, #f5f9ff);
        }

        .travelMetric span {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
        }

        .travelMetric strong {
            display: block;
            font-size: clamp(20px, 2.6vw, 29px);
            line-height: 1.06;
            word-break: keep-all;
        }

        .travelMetric small {
            display: block;
            margin-top: 8px;
            color: var(--muted);
            line-height: 1.35;
        }

        .budgetPanel {
            margin-bottom: 14px;
            padding: 12px;
        }

        .budgetPills {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }

        .budgetPill {
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px 12px;
            background: #fff;
        }

        .budgetPill span {
            display: block;
            margin-bottom: 6px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
        }

        .budgetPill b {
            display: block;
            color: var(--text);
            font-size: 18px;
            line-height: 1.1;
            word-break: keep-all;
        }

        .walletSummaryBar {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 10px;
        }

        .walletSummaryChip {
            width: 100%;
            min-width: 0;
            display: block;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 9px 10px;
            background: #fff;
            color: var(--text);
            text-align: left;
            box-shadow: var(--shadow);
            cursor: pointer;
        }

        .walletSummaryChip span,
        .budgetDetailCard span {
            display: block;
            margin-bottom: 4px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
        }

        .walletSummaryChip strong {
            display: block;
            color: var(--text);
            font-size: clamp(16px, 2.4vw, 21px);
            line-height: 1.08;
            word-break: keep-all;
        }

        .walletSummaryChip.emphasis {
            border-color: #b8d3ff;
            background: #f8fbff;
        }

        .actionPanel {
            margin-bottom: 10px;
        }

        .actionPanel .travelForm {
            padding: 10px;
        }

        .actionButtons {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }

        .actionButton {
            display: inline-grid;
            min-width: 0;
            min-height: 62px;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            color: var(--text);
            font-size: 17px;
            font-weight: 950;
            text-align: center;
            cursor: pointer;
        }

        .actionButton.primary {
            border-color: var(--blue);
            background: var(--blue);
            color: #fff;
        }

        .actionButton input[type="file"] {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .budgetDetailGrid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .budgetDetailCard {
            min-width: 0;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 11px;
            background: #fff;
        }

        .budgetDetailCard strong {
            display: block;
            color: var(--text);
            font-size: 19px;
            line-height: 1.12;
            word-break: keep-all;
        }

        .budgetDetailCard.wide {
            grid-column: 1 / -1;
        }

        .budgetDetailCard small {
            display: block;
            margin-top: 7px;
            color: var(--muted);
            line-height: 1.35;
        }

        .travelLayout {
            display: grid;
            grid-template-columns: minmax(310px, .84fr) minmax(0, 1.36fr);
            gap: 14px;
            align-items: start;
        }

        .travelStack {
            display: grid;
            gap: 14px;
        }

        .walletPanel {
            scroll-margin-top: 70px;
        }

        .uploadPanel {
            position: sticky;
            top: 68px;
            scroll-margin-top: 70px;
        }

        #ledgerPanel {
            scroll-margin-top: 70px;
        }

        .travelPanel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .travelPanelHead {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
            min-height: 66px;
            padding: 14px;
            border-bottom: 1px solid var(--line-soft);
            background: var(--soft);
        }

        .travelPanelHead strong {
            display: block;
            font-size: 17px;
        }

        .panelSub {
            margin-top: 2px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
        }

        .walletGrid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            padding: 12px;
        }

        .walletCard {
            display: grid;
            gap: 9px;
            min-width: 0;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }

        .walletCardTop {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: start;
        }

        .walletCard b {
            font-size: 14px;
        }

        .walletBalance {
            color: var(--blue);
            font-size: clamp(20px, 2.8vw, 28px);
            font-weight: 950;
            line-height: 1.05;
            word-break: keep-all;
        }

        .walletMeta {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.35;
        }

        .walletControls {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
            align-items: center;
        }

        .walletControls input {
            width: 100%;
            min-height: 38px;
            border: 1px solid var(--line);
            border-radius: 7px;
            padding: 8px 10px;
            text-align: right;
        }

        .travelForm,
        .travelList,
        .pinBox {
            display: grid;
            gap: 12px;
            padding: 12px;
        }

        .travelForm label,
        .pinBox label {
            display: grid;
            gap: 6px;
            min-width: 0;
        }

        .travelForm label span,
        .pinBox label span {
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
        }

        .travelForm input,
        .travelForm select,
        .travelForm textarea,
        .rateControl input,
        .pinBox input {
            width: 100%;
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 7px;
            background: #fff;
            color: var(--text);
            padding: 8px 10px;
        }

        .travelForm textarea {
            min-height: 72px;
            resize: vertical;
        }

        .travelForm input[type="file"] {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .fileDrop {
            display: grid;
            gap: 8px;
            min-height: 116px;
            padding: 16px;
            border: 1px dashed #b8c7dc;
            border-radius: 8px;
            background: #f8fbff;
            cursor: pointer;
            align-content: center;
        }

        .fileDropTitle {
            color: var(--text);
            font-size: 17px;
            font-weight: 950;
        }

        .fileDropMeta {
            color: var(--muted);
            font-size: 13px;
            line-height: 1.4;
        }

        .fileDropName {
            display: inline-flex;
            width: fit-content;
            max-width: 100%;
            min-height: 28px;
            align-items: center;
            border-radius: 7px;
            padding: 4px 8px;
            background: #fff;
            color: var(--text-soft);
            font-size: 12px;
            font-weight: 800;
            overflow-wrap: anywhere;
        }

        .quickCapture {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(102px, .32fr);
            gap: 10px;
        }

        .captureButton,
        .captureSecondary {
            display: inline-flex;
            min-height: 68px;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: 950;
            cursor: pointer;
            text-align: center;
        }

        .captureButton {
            border: 1px solid var(--blue);
            background: var(--blue);
            color: #fff;
            font-size: 20px;
        }

        .captureSecondary {
            border: 1px solid var(--line);
            background: #fff;
            color: var(--text);
            font-size: 15px;
        }

        .quickCapture input[type="file"] {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        .captureStatus {
            grid-column: 1 / -1;
            min-height: 20px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 800;
        }

        .captureStatus.error {
            color: #b42318;
        }

        .captureFile {
            min-height: 34px;
            border: 1px dashed #b8c7dc;
            border-radius: 8px;
            padding: 7px 10px;
            background: #f8fbff;
            color: var(--text-soft);
            font-size: 13px;
            font-weight: 800;
            overflow-wrap: anywhere;
        }

        .captureFile:empty {
            display: none;
        }

        .capturePanel {
            margin-bottom: 14px;
            scroll-margin-top: 70px;
        }

        .captureForm {
            gap: 10px;
        }

        .cameraPanel {
            position: fixed;
            inset: 0;
            z-index: 90;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            gap: 12px;
            border: 0;
            border-radius: 0;
            padding: calc(env(safe-area-inset-top, 0px) + 12px) 12px calc(env(safe-area-inset-bottom, 0px) + 12px);
            background: #05070d;
            box-shadow: none;
        }

        .cameraHead {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            color: #fff;
        }

        .cameraHead strong {
            font-size: 18px;
        }

        .cameraStage {
            position: relative;
            display: grid;
            min-height: 0;
            place-items: center;
        }

        .cameraPanel video {
            width: 100%;
            height: 100%;
            max-height: none;
            border-radius: 7px;
            background: #000;
            object-fit: contain;
        }

        .receiptGuide {
            position: absolute;
            inset: 9% 7%;
            border: 2px solid rgba(255, 255, 255, .75);
            border-radius: 10px;
            box-shadow: 0 0 0 999px rgba(0, 0, 0, .18);
            pointer-events: none;
        }

        .cameraTools {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(104px, .28fr);
            gap: 8px;
        }

        .cameraTools .captureButton,
        .cameraTools .captureSecondary {
            min-height: 64px;
        }

        .uploadOptions {
            border-top: 1px solid var(--line-soft);
            padding-top: 2px;
        }

        .uploadOptions summary {
            min-height: 42px;
            color: var(--text);
            font-size: 14px;
            font-weight: 950;
            cursor: pointer;
            list-style: none;
        }

        .uploadOptions summary::-webkit-details-marker {
            display: none;
        }

        .travelForm .two {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        .manualEntry {
            border-top: 1px solid var(--line-soft);
            padding: 0 12px 12px;
        }

        .manualEntry summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 46px;
            color: var(--text);
            font-size: 14px;
            font-weight: 950;
            cursor: pointer;
            list-style: none;
        }

        .manualEntry summary::-webkit-details-marker {
            display: none;
        }

        .manualEntry summary::after {
            content: "+";
            display: inline-grid;
            width: 26px;
            height: 26px;
            place-items: center;
            border-radius: 7px;
            background: var(--soft);
            color: var(--text-soft);
        }

        .manualEntry[open] summary::after {
            content: "-";
        }

        .manualForm {
            display: grid;
            gap: 10px;
            padding-top: 2px;
        }

        .quickManualForm {
            display: grid;
            gap: 10px;
            padding-top: 2px;
        }

        .quickManualForm textarea {
            min-height: 96px;
        }

        .manualAdvanced {
            margin-top: 10px;
            border-top: 1px solid var(--line-soft);
            padding-top: 2px;
        }

        .manualAdvanced summary {
            min-height: 42px;
            color: var(--muted);
            font-size: 13px;
        }

        .photoPreview {
            display: none;
            width: 100%;
            max-height: 260px;
            object-fit: contain;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--soft);
        }

        .photoPreview.show {
            display: block;
        }

        .travelEntry {
            display: grid;
            gap: 9px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
        }

        .travelEntryBody {
            display: grid;
            grid-template-columns: 74px minmax(0, 1fr);
            gap: 10px;
            align-items: start;
        }

        .receiptThumb {
            width: 74px;
            height: 74px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 0;
            background: var(--soft);
            overflow: hidden;
            cursor: pointer;
        }

        .receiptThumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .receiptThumb.empty {
            display: grid;
            place-items: center;
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
            cursor: default;
        }

        .travelEntryTop {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: start;
        }

        .travelEntry b {
            display: block;
            font-size: 15px;
        }

        .travelEntryMeta {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }

        .entryItemList {
            display: grid;
            gap: 5px;
            margin-top: 8px;
        }

        .entryItemRow {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 10px;
            align-items: baseline;
            min-height: 28px;
            border-radius: 7px;
            padding: 5px 8px;
            background: #f8fafc;
        }

        .entryItemName {
            min-width: 0;
            color: var(--text);
            font-size: 13px;
            font-weight: 850;
            overflow-wrap: anywhere;
        }

        .entryItemAmount {
            color: var(--text-soft);
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
        }

        .entryItemFallback {
            margin-top: 7px;
            color: var(--text-soft);
            font-size: 13px;
            font-weight: 850;
            line-height: 1.45;
            overflow-wrap: anywhere;
        }

        .travelAmount {
            color: var(--blue);
            font-size: 17px;
            font-weight: 950;
            white-space: nowrap;
        }

        .receiptLink {
            display: inline-flex;
            align-items: center;
            min-height: 26px;
            border-radius: 7px;
            padding: 3px 8px;
            background: var(--soft);
            color: var(--text-soft);
            font-size: 12px;
            font-weight: 800;
            text-decoration: none;
        }

        .receiptLink {
            background: #eef4ff;
            color: var(--blue);
        }

        .aiNoteButton {
            border: 0;
            background: #eef4ff;
            color: var(--blue);
            cursor: pointer;
        }

        .entryFooter {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            align-items: center;
            min-height: 30px;
        }

        .entryStatus {
            margin-right: auto;
            border-radius: 7px;
            padding: 4px 8px;
            background: #eef2ff;
            color: #3046a5;
            font-size: 12px;
            font-weight: 850;
        }

        .entryManage {
            position: relative;
            justify-self: end;
        }

        .entryManage summary {
            display: inline-grid;
            min-width: 52px;
            min-height: 30px;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: 7px;
            background: #fff;
            color: var(--text-soft);
            font-size: 12px;
            font-weight: 900;
            cursor: pointer;
            list-style: none;
        }

        .entryManage summary::-webkit-details-marker {
            display: none;
        }

        .entryMenu {
            position: absolute;
            right: 0;
            top: calc(100% + 6px);
            z-index: 8;
            display: grid;
            gap: 6px;
            min-width: 118px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 7px;
            background: #fff;
            box-shadow: var(--shadow-pop);
        }

        .entryMenu .receiptLink,
        .entryMenu .travelDangerButton {
            justify-content: center;
            min-height: 34px;
            padding: 4px 10px;
            font-size: 12px;
        }

        .receiptModal {
            position: fixed;
            inset: 0;
            z-index: 80;
            display: grid;
            place-items: center;
            padding: 14px;
            background: rgba(15, 23, 42, .66);
            backdrop-filter: blur(8px);
        }

        .receiptDialog {
            width: min(560px, 100%);
            max-height: calc(100dvh - 28px);
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            overflow: hidden;
            box-shadow: var(--shadow-pop);
        }

        .receiptDialogHead {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--line-soft);
            background: var(--soft);
        }

        .receiptDialogHead strong {
            font-size: 17px;
        }

        .receiptDialogBody {
            display: grid;
            gap: 12px;
            min-height: 0;
            overflow: auto;
            padding: 12px;
        }

        .modalReceiptImage {
            width: 100%;
            max-height: 48dvh;
            object-fit: contain;
            border-radius: 8px;
            background: #111827;
        }

        .aiNoteBox {
            display: grid;
            gap: 6px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px;
            background: #fff;
        }

        .aiNoteBox span {
            color: var(--muted);
            font-size: 12px;
            font-weight: 900;
        }

        .modalExpenseSummary {
            display: grid;
            gap: 6px;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px;
            background: #fff;
        }

        .receiptDialogFoot {
            display: grid;
            padding: 12px;
            border-top: 1px solid var(--line-soft);
            background: #fff;
        }

        .emptyEntry {
            min-height: 112px;
            align-content: center;
            background: linear-gradient(180deg, #fff, #fafbfc);
        }

        .rateControl {
            display: grid;
            gap: 4px;
            min-width: 112px;
        }

        .rateControl .label {
            margin: 0;
        }

        .rateControl input {
            height: 36px;
            min-height: 36px;
            padding: 0 8px;
            text-align: right;
        }

        .pinOverlay {
            position: fixed;
            inset: 0;
            z-index: 30;
            display: grid;
            place-items: center;
            padding: 18px;
            background: rgba(16, 24, 40, .62);
            backdrop-filter: blur(10px);
        }

        .pinOverlay.hidden {
            display: none;
        }

        .pinCard {
            width: min(420px, 100%);
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            box-shadow: var(--shadow-pop);
            overflow: hidden;
        }

        .pinCardHead {
            padding: 18px;
            border-bottom: 1px solid var(--line-soft);
        }

        .pinCardHead p {
            margin: 6px 0 0;
            color: var(--muted);
            line-height: 1.45;
        }

        .statusLine {
            min-height: 20px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.4;
        }

        .statusLine.error {
            color: #b42318;
            font-weight: 800;
        }

        .hidden {
            display: none !important;
        }

        body.cameraOpen {
            overflow: hidden;
        }

        body.cameraOpen .bottomNav {
            display: none;
        }

        @media (max-width: 900px) {
            .travelTop,
            .travelLayout {
                grid-template-columns: 1fr;
            }

            .travelStack {
                order: 1;
                display: flex;
                flex-direction: column;
            }

            .uploadPanel {
                order: 2;
                position: static;
            }

            #ledgerPanel {
                order: 1;
            }

            .walletPanel {
                order: 2;
            }

            .travelActions {
                justify-content: stretch;
            }

            .travelActions > * {
                flex: 1 1 130px;
                justify-content: center;
            }

            .travelGrid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .walletGrid {
                grid-template-columns: repeat(4, minmax(190px, 1fr));
                overflow-x: auto;
                scroll-snap-type: x proximity;
            }

            .walletCard {
                scroll-snap-align: start;
            }
        }

        @media (max-width: 560px) {
            html {
                scroll-padding-top: 76px;
                scroll-padding-bottom: 92px;
            }

            .travelShell {
                width: 100%;
                padding: 8px 8px calc(94px + env(safe-area-inset-bottom, 0px));
            }

            .travelTop {
                position: sticky;
                top: 0;
                z-index: 40;
                grid-template-columns: minmax(0, 1fr) auto;
                gap: 10px;
                margin-bottom: 8px;
                padding: 12px;
            }

            .travelTop h1 {
                font-size: 22px;
            }

            .travelActions {
                display: flex;
                justify-content: flex-end;
            }

            #exportCsvButton {
                display: none;
            }

            #lockButton {
                min-width: 70px;
                padding: 0 10px;
            }

            .travelButton,
            .travelGhostButton,
            .travelDangerButton {
                min-height: 42px;
            }

            .travelGrid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 8px;
                margin-bottom: 10px;
            }

            .walletSummaryBar {
                gap: 6px;
                margin-bottom: 8px;
            }

            .walletSummaryChip {
                padding: 8px;
            }

            .walletSummaryChip strong {
                font-size: 16px;
            }

            .actionButton {
                min-height: 58px;
                font-size: 16px;
            }

            .budgetDetailGrid {
                grid-template-columns: 1fr;
            }

            .budgetPanel {
                margin-bottom: 10px;
                padding: 8px;
            }

            .budgetPills {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 8px;
            }

            .budgetPill {
                padding: 9px;
            }

            .budgetPill b {
                font-size: 16px;
            }

            .primaryMetric {
                grid-column: auto;
            }

            .travelMetric:last-child {
                grid-column: auto;
            }

            .fixedMetric,
            .budgetMetric {
                display: none;
            }

            .travelForm .two {
                grid-template-columns: 1fr;
            }

            .manualEntry {
                padding-left: 12px;
                padding-right: 12px;
            }

            .travelMetric {
                min-height: 84px;
                padding: 12px;
            }

            .travelMetric strong {
                font-size: 20px;
            }

            .travelMetric:not(.primaryMetric) {
                min-height: auto;
            }

            .walletGrid {
                grid-template-columns: 1fr;
                overflow: visible;
            }

            .travelEntryTop {
                grid-template-columns: 1fr;
            }

            .travelEntryBody {
                grid-template-columns: 62px minmax(0, 1fr);
            }

            .receiptThumb {
                width: 62px;
                height: 62px;
            }

            .travelAmount {
                justify-self: start;
            }

            .travelPanelHead,
            .ledgerHead {
                align-items: start;
            }

            .fileDrop {
                min-height: 104px;
            }

            .quickNav {
                display: none;
            }

            .quickCapture .captureButton,
            .quickCapture .captureSecondary {
                min-height: 58px;
            }

            .quickCapture .captureButton {
                font-size: 19px;
            }

            .travelPanelHead {
                min-height: 58px;
                padding: 12px;
            }

            .capturePanel,
            .travelLayout,
            .travelStack {
                gap: 10px;
                margin-bottom: 10px;
            }

            .travelEntry {
                padding: 10px;
            }

            .entryMenu .travelDangerButton {
                min-height: 34px;
                padding: 0 12px;
            }

            .bottomNav {
                position: fixed;
                left: 8px;
                right: 8px;
                bottom: calc(8px + env(safe-area-inset-bottom, 0px));
                z-index: 70;
                display: grid;
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 6px;
                padding: 7px;
                border: 1px solid rgba(148, 163, 184, .48);
                border-radius: 8px;
                background: rgba(255, 255, 255, .96);
                box-shadow: 0 14px 34px rgba(15, 23, 42, .18);
                backdrop-filter: blur(12px);
            }

            .bottomNav a {
                display: inline-flex;
                min-height: 44px;
                align-items: center;
                justify-content: center;
                border-radius: 7px;
                color: var(--text-soft);
                font-size: 13px;
                font-weight: 950;
                text-decoration: none;
            }

            .bottomNav a.active {
                background: var(--blue);
                color: #fff;
            }
        }
    </style>
</head>
<body>
    <div id="pinOverlay" class="pinOverlay hidden" aria-hidden="true">
        <section class="pinCard">
            <div class="pinCardHead">
                <span class="eyebrow">PRIVATE</span>
                <h1>영수증 AI 정산</h1>
            </div>
            <form id="pinForm" class="pinBox">
                <label>
                    <span>비밀번호</span>
                    <input id="pinInput" type="password" inputmode="numeric" autocomplete="current-password" placeholder="비밀번호 입력">
                </label>
                <button class="travelButton" type="submit">열기</button>
                <div id="pinStatus" class="statusLine"></div>
            </form>
        </section>
    </div>

    <main class="travelShell">
        <section class="walletSummaryBar" aria-label="지갑 요약">
            <button class="walletSummaryChip" type="button" data-budget-open>
                <span>현금</span>
                <strong id="cashSummaryJpy">0엔</strong>
            </button>
            <button class="walletSummaryChip" type="button" data-budget-open>
                <span>IC카드</span>
                <strong id="icSummaryJpy">0엔</strong>
            </button>
            <button class="walletSummaryChip emphasis" type="button" data-budget-open>
                <span>하나머니</span>
                <strong id="hanaSummaryJpy">133,227엔</strong>
            </button>
        </section>

        <section id="receiptPanel" class="travelPanel capturePanel actionPanel">
            <form id="expenseForm" class="travelForm captureForm">
                <div class="actionButtons" aria-label="빠른 결제 추가">
                    <button id="openCameraButton" class="actionButton primary" type="button">촬영</button>
                    <label class="actionButton" for="receiptGalleryInput">앨범</label>
                    <input id="receiptGalleryInput" type="file" accept="image/*">
                    <button id="openManualButton" class="actionButton" type="button">수동</button>
                    <div id="quickCaptureStatus" class="captureStatus"></div>
                </div>
                <span id="saveStatus" class="statusLine"></span>

                <section id="cameraPanel" class="cameraPanel hidden" aria-label="카메라">
                    <div class="cameraHead">
                        <strong>영수증 촬영</strong>
                        <button id="closeCameraTopButton" class="captureSecondary" type="button">닫기</button>
                    </div>
                    <div class="cameraStage">
                        <video id="cameraPreview" autoplay playsinline muted></video>
                        <div class="receiptGuide" aria-hidden="true"></div>
                    </div>
                    <canvas id="cameraCanvas" class="hidden"></canvas>
                    <div class="cameraTools">
                        <button id="captureShotButton" class="captureButton" type="button">찍기</button>
                        <button id="closeCameraButton" class="captureSecondary" type="button">취소</button>
                    </div>
                </section>

                <img id="photoPreview" class="photoPreview" alt="영수증 미리보기">
                <div id="receiptFileName" class="captureFile"></div>

                <details class="uploadOptions">
                    <summary>옵션</summary>
                    <div class="two">
                        <label>
                            <span>날짜</span>
                            <input id="dateInput" type="date">
                        </label>
                        <label>
                            <span>결제자</span>
                            <select id="payerInput">
                                <option>공금</option>
                                <option>본인</option>
                                <option>엄마</option>
                                <option>아빠</option>
                                <option>기타</option>
                            </select>
                        </label>
                    </div>

                    <label>
                        <span>메모</span>
                        <textarea id="memoInput" placeholder="선택"></textarea>
                    </label>
                </details>
            </form>
        </section>

        <section class="travelLayout">
            <article id="manualPanel" class="travelPanel uploadPanel">
                <div class="travelPanelHead">
                    <div>
                        <span class="label">입력</span>
                        <strong>수동</strong>
                    </div>
                </div>
                <details id="manualEntryDetails" class="manualEntry">
                    <summary>문장 입력</summary>
                    <form id="quickManualForm" class="travelForm quickManualForm">
                        <label>
                            <span>내용</span>
                            <textarea id="quickManualText" placeholder="예: 버스 660엔 이코카&#10;카페 1200엔 카드&#10;편의점 890엔"></textarea>
                        </label>
                        <div class="two">
                            <label>
                                <span>날짜</span>
                                <input id="quickManualDate" type="date">
                            </label>
                            <label>
                                <span>결제자</span>
                                <select id="quickManualPayer">
                                    <option>공금</option>
                                    <option>본인</option>
                                    <option>엄마</option>
                                    <option>아빠</option>
                                    <option>기타</option>
                                </select>
                            </label>
                        </div>
                        <button class="travelButton full" type="submit">입력</button>
                    </form>
                    <details class="manualAdvanced">
                        <summary>직접 입력</summary>
                        <form id="manualForm" class="travelForm manualForm">
                        <div class="two">
                            <label>
                                <span>유형</span>
                                <select id="manualTransactionType">
                                    <option>지출</option>
                                    <option>현금인출</option>
                                    <option>IC충전</option>
                                    <option>환전</option>
                                    <option>환급</option>
                                    <option>수수료</option>
                                    <option>정산이동</option>
                                </select>
                            </label>
                            <label>
                                <span>수단</span>
                                <select id="manualMethod">
                                    <option>현금</option>
                                    <option>교통카드</option>
                                    <option>카드</option>
                                    <option>기타</option>
                                </select>
                            </label>
                        </div>
                        <div class="two">
                            <label>
                                <span>통화</span>
                                <select id="manualCurrency">
                                    <option>JPY</option>
                                    <option>KRW</option>
                                </select>
                            </label>
                            <label>
                                <span>금액</span>
                                <input id="manualAmount" type="number" inputmode="numeric" min="0" step="1" placeholder="0">
                            </label>
                        </div>
                        <div class="two">
                            <label>
                                <span>날짜</span>
                                <input id="manualDate" type="date">
                            </label>
                            <label>
                                <span>결제자</span>
                                <select id="manualPayer">
                                    <option>공금</option>
                                    <option>본인</option>
                                    <option>엄마</option>
                                    <option>아빠</option>
                                    <option>기타</option>
                                </select>
                            </label>
                        </div>
                        <label>
                            <span>내용</span>
                            <input id="manualMerchant" type="text" placeholder="예: 버스">
                        </label>
                        <div class="two">
                            <label>
                                <span>IC카드</span>
                                <select id="manualIcCard">
                                    <option value="">없음</option>
                                    <option>ICOCA</option>
                                    <option>Suica</option>
                                    <option>PASMO</option>
                                    <option>기타</option>
                                </select>
                            </label>
                            <label>
                                <span>잔액</span>
                                <input id="manualIcBalance" type="number" inputmode="numeric" min="0" step="1" placeholder="선택">
                            </label>
                        </div>
                        <label>
                            <span>메모</span>
                            <textarea id="manualMemo" placeholder="선택"></textarea>
                        </label>
                        <button class="travelGhostButton" type="submit">저장</button>
                        </form>
                    </details>
                </details>
            </article>

            <div class="travelStack">
                <section id="walletPanel" class="travelPanel walletPanel" aria-label="현재 잔액">
                    <div class="travelPanelHead">
                        <div>
                            <span class="label">지갑</span>
                            <strong>잔액</strong>
                        </div>
                        <span id="walletStatus" class="statusLine"></span>
                    </div>
                    <div id="walletList" class="walletGrid"></div>
                </section>

                <article id="ledgerPanel" class="travelPanel">
                    <div class="travelPanelHead ledgerHead">
                        <div>
                            <span class="label">최근 내역</span>
                            <strong id="entrySummary">0건</strong>
                        </div>
                        <label class="rateControl">
                            <span class="label">환율</span>
                            <input id="rateInput" type="number" inputmode="decimal" min="0" step="0.01" value="9.39">
                        </label>
                    </div>
                    <div id="travelList" class="travelList"></div>
                </article>
            </div>
        </section>
    </main>

    <nav class="bottomNav" aria-label="여행 정산 이동">
        <a class="active" href="#receiptPanel">촬영</a>
        <a href="#ledgerPanel">내역</a>
        <a href="#walletPanel">지갑</a>
        <a href="#manualPanel">수동</a>
    </nav>

    <section id="budgetModal" class="receiptModal hidden" aria-modal="true" role="dialog" aria-label="예산 상세">
        <article class="receiptDialog budgetDialog">
            <div class="receiptDialogHead">
                <strong>예산 상세</strong>
                <button id="budgetCloseButton" class="travelGhostButton" type="button">닫기</button>
            </div>
            <div class="receiptDialogBody">
                <div class="budgetDetailGrid">
                    <div class="budgetDetailCard wide">
                        <span>하나머니</span>
                        <strong id="hanaBudgetJpy">133,227엔</strong>
                        <small>이미 환전된 엔화는 고정 환율 기준으로 본다.</small>
                    </div>
                    <div class="budgetDetailCard">
                        <span>현지 한도</span>
                        <strong id="localBudgetJpy">94,645엔</strong>
                    </div>
                    <div class="budgetDetailCard">
                        <span>엔화 여유</span>
                        <strong id="hanaBudgetDiff">+38,582엔</strong>
                    </div>
                    <div class="budgetDetailCard">
                        <span>남은 예산</span>
                        <strong id="remainTotal">888,715원</strong>
                        <small id="remainMeta">94,645엔 한도</small>
                    </div>
                    <div class="budgetDetailCard">
                        <span>현지 등록액</span>
                        <strong id="spentTotal">0원</strong>
                        <small id="spentMeta">0건</small>
                    </div>
                    <div class="budgetDetailCard">
                        <span>고정비</span>
                        <strong id="fixedTotal">2,111,285원</strong>
                    </div>
                    <div class="budgetDetailCard">
                        <span>총 예산</span>
                        <strong id="budgetTotal">3,000,000원</strong>
                    </div>
                    <div class="budgetDetailCard wide">
                        <span>기준 환율</span>
                        <strong id="budgetRate">9.39원/엔</strong>
                    </div>
                </div>
            </div>
        </article>
    </section>

    <section id="receiptModal" class="receiptModal hidden" aria-modal="true" role="dialog" aria-label="영수증 상세">
        <article class="receiptDialog">
            <div class="receiptDialogHead">
                <strong id="modalTitle">영수증</strong>
                <button id="modalCloseButton" class="travelGhostButton" type="button">닫기</button>
            </div>
            <div class="receiptDialogBody">
                <img id="modalReceiptImage" class="modalReceiptImage" alt="영수증 이미지">
                <div id="modalExpenseSummary" class="modalExpenseSummary"></div>
                <div class="aiNoteBox">
                    <span>AI 코멘트</span>
                    <p id="modalAiNote"></p>
                </div>
            </div>
            <div class="receiptDialogFoot">
                <a id="modalReceiptLink" class="travelGhostButton" href="#" target="_blank" rel="noopener noreferrer">원본 열기</a>
            </div>
        </article>
    </section>

    <script src="./travel.js"></script>
</body>
</html>
