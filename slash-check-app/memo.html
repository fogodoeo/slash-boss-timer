<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>개인 메모</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="memoPage">
    <main class="memoShell">
        <header class="memoHeader">
            <div>
                <span class="eyebrow">PRIVATE NOTE</span>
                <h1>개인 메모</h1>
                <p class="pageDesc">직접 주소와 비밀번호로만 여는 비공개 메모장입니다.</p>
            </div>
            <span id="memoState" class="memoState">잠김</span>
        </header>

        <section id="memoLockPanel" class="memoPanel memoLockPanel">
            <div>
                <span class="label">비밀번호</span>
                <strong>메모 열기</strong>
                <p>관리자 비밀번호를 입력하면 저장된 메모를 불러옵니다.</p>
            </div>
            <form id="memoUnlockForm" class="memoUnlockForm">
                <input id="memoPasswordInput" type="password" autocomplete="current-password" placeholder="관리자 비밀번호">
                <button type="submit">열기</button>
            </form>
            <p id="memoLockMessage" class="memoLockMessage"></p>
        </section>

        <section id="memoEditorPanel" class="memoPanel memoEditorPanel hidden">
            <div class="memoToolbar">
                <div>
                    <span class="label">메모</span>
                    <strong id="memoUpdatedText">저장 전</strong>
                </div>
                <div class="memoActions">
                    <button id="memoLockButton" class="memoGhostButton" type="button">잠금</button>
                    <button id="memoSaveButton" type="button">저장</button>
                </div>
            </div>
            <textarea id="memoContentInput" spellcheck="false" placeholder="여기에 메모를 적으세요."></textarea>
            <div class="memoFooter">
                <span id="memoCountText">0자</span>
                <span id="memoStatusText">저장됨</span>
            </div>
        </section>
    </main>

    <script src="./memo.js"></script>
</body>
</html>
