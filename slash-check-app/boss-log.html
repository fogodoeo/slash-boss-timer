<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>운영 로그</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="bossPage">
    <main class="shell">
        <header class="topbar">
            <div>
                <span class="eyebrow">감사 로그</span>
                <h1>로그</h1>
                <p class="pageDesc">썰자 완료, 보스 컷, 수정, 취소 이력을 한곳에서 확인합니다.</p>
            </div>
            <nav class="navTabs" aria-label="페이지 이동">
                <a href="./">썰자</a>
                <a href="./boss.html">보스</a>
                <a class="active" href="./boss-log.html">로그</a>
                <a href="./admin.html">관리</a>
            </nav>
            <div class="topbarActions">
                <button id="openProfileButton" class="memberChip" type="button" aria-label="닉네임 변경">
                    <span class="profileLabel">내 닉네임</span>
                    <strong id="selectedMemberLabel">길드원 미선택</strong>
                </button>
                <button id="enableNotifyButton" class="notifyIconButton" type="button" aria-label="알림 켜기" title="알림 켜기">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M12 22a2.2 2.2 0 0 0 2.2-2.2H9.8A2.2 2.2 0 0 0 12 22Zm7-5.2-1.8-1.8v-4.3c0-3-1.6-5.5-4.4-6.2V3.8a.8.8 0 0 0-1.6 0v.7C8.5 5.2 6.8 7.7 6.8 10.7V15L5 16.8v1h14v-1Zm-3.4-.6H8.4v-5.5c0-2.3 1.3-4.6 3.6-4.6s3.6 2.3 3.6 4.6v5.5Z"/>
                    </svg>
                    <span class="notifyDot" aria-hidden="true"></span>
                    <span class="notifyText">알림</span>
                </button>
            </div>
        </header>

        <section class="bossLogToolbar panel">
            <div>
                <span class="label">운영 로그</span>
                <strong id="bossLogSummary">기록 불러오는 중</strong>
            </div>
            <label class="bossSearch">
                <span>검색</span>
                <input id="bossLogSearchInput" type="search" placeholder="대상, 작업자, 내용">
            </label>
            <div class="bossLogFilterGrid">
                <label>
                    <span>구분</span>
                    <select id="bossLogCategoryFilter">
                        <option value="all">전체</option>
                        <option value="slash">썰자</option>
                        <option value="boss">보스</option>
                    </select>
                </label>
                <label>
                    <span>작업</span>
                    <select id="bossLogActionFilter">
                        <option value="all">전체 작업</option>
                        <option value="cut-create">컷 등록</option>
                        <option value="cut-update">시간 수정</option>
                        <option value="cut-cancel">컷 취소</option>
                        <option value="participant-add">참여 확인</option>
                    </select>
                </label>
                <label>
                    <span>대상</span>
                    <select id="bossLogBossFilter">
                        <option value="all">전체 대상</option>
                    </select>
                </label>
                <label>
                    <span>작업자</span>
                    <select id="bossLogActorFilter">
                        <option value="all">전체 작업자</option>
                    </select>
                </label>
            </div>
        </section>

        <section class="bossLogStats">
            <article class="metricCard">
                <span>전체</span>
                <strong id="logMetricTotal">0</strong>
                <small>최근 로그</small>
            </article>
            <article class="metricCard">
                <span>썰자</span>
                <strong id="logMetricCreate">0</strong>
                <small>완료/관리</small>
            </article>
            <article class="metricCard">
                <span>보스</span>
                <strong id="logMetricUpdate">0</strong>
                <small>컷/참여</small>
            </article>
            <article class="metricCard">
                <span>취소</span>
                <strong id="logMetricCancel">0</strong>
                <small>취소됨</small>
            </article>
        </section>

        <section class="panel">
            <div class="panelHead">
                <div>
                    <span class="label">이력</span>
                    <strong id="bossLogListSummary">0건</strong>
                </div>
            </div>
            <div id="bossLogList" class="bossLogList"></div>
        </section>
    </main>

    <div id="toastHost" class="toastHost" aria-live="polite"></div>
    <script src="./common-header.js"></script>
    <script src="./boss-alert-monitor.js"></script>
    <script src="./boss-log.js"></script>
</body>
</html>
