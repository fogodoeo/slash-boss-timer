<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrestBase 로그</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body class="geckoSimplePage">
    <main class="gxShell">
        <header class="gxHeader">
            <div class="gxBrand">
                <span class="gxLogo">CB</span>
                <div>
                    <span class="gxEyebrow">AUDIT LOG</span>
                    <h1>작업 로그</h1>
                </div>
            </div>
            <div class="gxHeaderActions">
                <a class="gxGhostLink" href="./gecko.html">돌아가기</a>
            </div>
        </header>

        <section class="gxPanel">
            <div class="gxPanelHead">
                <div>
                    <span>LOG</span>
                    <h2>등록·수정·삭제 기록</h2>
                    <p>누가 어떤 개체를 수정했는지 시간순으로 확인합니다.</p>
                </div>
                <button id="reloadLogButton" type="button" class="gxSoftButton">새로고침</button>
            </div>
            <div id="geckoLogList" class="gxLogList"></div>
        </section>
    </main>
    <div id="toastHost" class="toastHost"></div>
    <script src="./gecko-log.js"></script>
</body>
</html>
