<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>썰자 랭킹</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="shell">
        <header class="topbar">
            <div>
                <span class="eyebrow">활동 기록</span>
                <h1>랭킹과 기록</h1>
                <p class="pageDesc">기간별 참여 횟수와 길드원별 활동 내역을 확인합니다.</p>
            </div>
            <nav class="navTabs" aria-label="페이지 이동">
                <a class="active" href="./">썰자</a>
                <a href="./boss.html">보스</a>
                <a href="./boss-log.html">로그</a>
                <a href="./admin.html">관리</a>
            </nav>
        </header>

        <nav class="sectionTabs" aria-label="썰자 메뉴">
            <a href="./">체크</a>
            <a class="active" href="./ranking.html">랭킹</a>
            <a href="./analytics.html">분석</a>
        </nav>

        <section class="rankingLayout">
            <section class="panel">
                <div class="panelHead">
                    <div>
                        <span class="label">종합 랭킹</span>
                        <strong id="rankingSummary">0명 참여</strong>
                    </div>
                </div>
                <div class="rankingFilters">
                    <div class="segmented" aria-label="기간 선택">
                        <button class="active" type="button" data-period="day">일간</button>
                        <button type="button" data-period="week">주간</button>
                        <button type="button" data-period="all">전체</button>
                    </div>
                    <label>
                        <span>길드원 필터</span>
                        <input id="memberFilterInput" type="text" placeholder="예: N건강">
                    </label>
                    <button id="clearMemberFilterButton" class="filterClearButton hidden" type="button">필터 해제</button>
                </div>
                <div id="rankingList" class="rankingList wide"></div>
            </section>

            <section class="panel">
                <div class="panelHead">
                    <div>
                        <span id="logPanelLabel" class="label">최근 기록</span>
                        <strong id="logSummary">0건</strong>
                    </div>
                </div>
                <div id="logList" class="logList"></div>
            </section>
        </section>
    </main>

    <div id="logManageModal" class="modalOverlay hidden" role="dialog" aria-modal="true" aria-labelledby="logManageTitle">
        <section class="logManageSheet">
            <button id="closeLogManageButton" class="modalClose" type="button" aria-label="닫기">×</button>
            <span class="modalEyebrow">기록 관리</span>
            <h2 id="logManageTitle">완료 기록 관리</h2>
            <p id="logManageDesc">기록을 확인한 뒤 필요한 작업만 처리하세요.</p>
            <label class="logManageField">
                <span>완료자 수정</span>
                <select id="logMemberSelect"></select>
            </label>
            <label class="logManageField">
                <span>작업자</span>
                <select id="logActorSelect"></select>
            </label>
            <label class="logManageField">
                <span>관리자 비밀번호</span>
                <input id="logAdminPasswordInput" type="password" autocomplete="off" placeholder="수정/취소 시 입력">
            </label>
            <button id="saveLogEditButton" class="logManagePrimary" type="button">완료자 수정 저장</button>
            <div class="logDeleteBox">
                <strong>기록 취소</strong>
                <span>랭킹에서 이 완료 기록이 빠집니다. 아래 칸에 취소를 입력해야 실행됩니다.</span>
                <input id="deleteConfirmInput" type="text" autocomplete="off" placeholder="취소">
                <button id="deleteLogButton" type="button" disabled>기록 취소</button>
            </div>
        </section>
    </div>

    <div id="toastHost" class="toastHost" aria-live="polite"></div>

    <script src="./ranking.js"></script>
</body>
</html>
