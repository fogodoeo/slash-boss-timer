<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>썰자 관리</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <main class="shell">
        <header class="topbar">
            <div>
                <span class="eyebrow">설정 관리</span>
                <h1>관리</h1>
                <p class="pageDesc">길드원 목록, 썰자 구역, 구역별 쿨타임을 관리합니다.</p>
            </div>
            <nav class="navTabs" aria-label="페이지 이동">
                <a href="./">썰자</a>
                <a href="./ranking.html">랭킹</a>
                <a href="./analytics.html">분석</a>
                <a href="./boss.html">보스</a>
                <a href="./boss-log.html">로그</a>
                <a class="active" href="./admin.html">관리</a>
            </nav>
        </header>

        <section class="adminSaveBar">
            <div>
                <span class="label">저장 대기</span>
                <strong id="changeSummary">변경 없음</strong>
                <p id="changeHint">구역명, 쿨타임, 길드원 목록, 보스 일정을 수정한 뒤 일괄 저장하세요.</p>
            </div>
            <button id="bulkSaveButton" type="button" disabled>일괄 저장</button>
        </section>

        <section id="changeReport" class="changeReport hidden" aria-live="polite"></section>

        <section class="adminLayout">
            <section class="panel">
                <div class="panelHead">
                    <div>
                        <span class="label">구역 추가</span>
                        <strong>새 썰자 구역</strong>
                    </div>
                </div>
                <form id="zoneForm" class="zoneForm">
                    <label>
                        <span>썰자 구역명</span>
                        <input id="zoneNameInput" type="text" placeholder="예: 잊혀진 협곡">
                    </label>
                    <label>
                        <span>기본 쿨타임(분)</span>
                        <input id="cooldownInput" type="number" min="1" max="1440" value="60">
                    </label>
                    <button type="submit">추가</button>
                </form>
            </section>

            <section class="panel">
                <div class="panelHead">
                    <div>
                        <span class="label">구역/쿨타임 관리</span>
                        <strong id="zoneSummary">0개</strong>
                    </div>
                </div>
                <div id="zoneManageList" class="zoneManageList"></div>
            </section>

            <section class="panel memberPanel">
                <div class="panelHead">
                    <div>
                        <span class="label">길드원 목록</span>
                        <strong id="memberSummary">0명</strong>
                    </div>
                </div>
                <textarea id="memberBulkInput" placeholder="N건강&#10;N하늘&#10;N라온"></textarea>
                <p class="memberSaveHint">이 목록도 상단의 일괄 저장 버튼으로 함께 저장됩니다.</p>
            </section>

            <section class="panel bossAdminPanel">
                <div class="panelHead">
                    <div>
                        <span class="label">보스 일정 관리</span>
                        <strong id="bossAdminSummary">0개</strong>
                    </div>
                </div>
                <div class="bossAdminTools">
                    <form id="bossForm" class="bossForm">
                        <input id="bossNameInput" type="text" placeholder="보스명">
                        <input id="bossAliasInput" type="text" placeholder="애칭">
                        <select id="bossTypeInput">
                            <option value="시간">시간보스</option>
                            <option value="고정">고정보스</option>
                        </select>
                        <button type="submit">보스 추가</button>
                    </form>
                    <label class="bossAdminSearch">
                        <span>검색</span>
                        <input id="bossManageSearchInput" type="search" placeholder="보스명, 애칭, 위치">
                    </label>
                </div>
                <div id="bossManageList" class="bossManageList"></div>
            </section>
        </section>
    </main>

    <div id="toastHost" class="toastHost" aria-live="polite"></div>

    <script src="./admin.js"></script>
</body>
</html>
